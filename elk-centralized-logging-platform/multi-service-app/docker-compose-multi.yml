services:

  web-frontend:
    image: nginx:alpine
    container_name: web-frontend

    ports:
      - "8082:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

    logging:
      driver: gelf
      options:
        gelf-address: "udp://localhost:12201"
        tag: "web-frontend"

    networks:
      - elk-centralized-logging-platform_elk-network

    depends_on:
      - api-backend

  api-backend:
    build:
      context: .
      dockerfile: Dockerfile.api

    container_name: api-backend

    ports:
      - "8083:5000"

    logging:
      driver: gelf
      options:
        gelf-address: "udp://localhost:12201"
        tag: "api-backend"

    networks:
      - elk-centralized-logging-platform_elk-network

  database:
    image: postgres:15-alpine
    container_name: database

    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass

    logging:
      driver: gelf
      options:
        gelf-address: "udp://localhost:12201"
        tag: "database"

    networks:
      - elk-centralized-logging-platform_elk-network

  redis-cache:
    image: redis:alpine
    container_name: redis-cache

    logging:
      driver: gelf
      options:
        gelf-address: "udp://localhost:12201"
        tag: "redis-cache"

    networks:
      - elk-centralized-logging-platform_elk-network

networks:
  elk-centralized-logging-platform_elk-network:
    external: true
