name: compose-application-stack
services:
  adminer:
    depends_on:
      postgres:
        condition: service_healthy
        required: true
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    image: adminer:4.8.1
    networks:
      app-network: null
    ports:
      - mode: ingress
        target: 8080
        published: "8081"
        protocol: tcp
    restart: unless-stopped
  nginx:
    depends_on:
      web:
        condition: service_started
        required: true
    image: nginx:alpine
    networks:
      app-network: null
    ports:
      - mode: ingress
        target: 80
        published: "8080"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /home/ubuntu/compose-application-stack/nginx/nginx.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
        bind:
          create_host_path: true
  postgres:
    environment:
      APP_PORT: "8080"
      FLASK_ENV: production
      NETWORK_SUBNET: 172.20.0.0/16
      POSTGRES_DB: appdb
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: apppass
      POSTGRES_PORT: "5432"
      POSTGRES_USER: appuser
      REDIS_HOST: redis
      REDIS_PASSWORD: redispass
      REDIS_PORT: "6379"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U appuser -d appdb
      timeout: 10s
      interval: 30s
      retries: 3
    image: postgres:16-alpine
    networks:
      app-network: null
    restart: unless-stopped
    volumes:
      - type: volume
        source: postgres-data
        target: /var/lib/postgresql/data
        volume: {}
      - type: bind
        source: /home/ubuntu/compose-application-stack/config/postgres/init.sql
        target: /docker-entrypoint-initdb.d/init.sql
        read_only: true
        bind:
          create_host_path: true
  redis:
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - redispass
    environment:
      APP_PORT: "8080"
      FLASK_ENV: production
      NETWORK_SUBNET: 172.20.0.0/16
      POSTGRES_DB: appdb
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: apppass
      POSTGRES_PORT: "5432"
      POSTGRES_USER: appuser
      REDIS_HOST: redis
      REDIS_PASSWORD: redispass
      REDIS_PORT: "6379"
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a redispass ping | grep PONG
      timeout: 10s
      interval: 30s
      retries: 3
    image: redis:7-alpine
    networks:
      app-network: null
    restart: unless-stopped
    volumes:
      - type: volume
        source: redis-data
        target: /data
        volume: {}
  web:
    build:
      context: /home/ubuntu/compose-application-stack/web-app
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
    environment:
      APP_PORT: "8080"
      FLASK_ENV: production
      NETWORK_SUBNET: 172.20.0.0/16
      POSTGRES_DB: appdb
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: apppass
      POSTGRES_PORT: "5432"
      POSTGRES_USER: appuser
      REDIS_HOST: redis
      REDIS_PASSWORD: redispass
      REDIS_PORT: "6379"
    expose:
      - "5000"
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:5000/health
      timeout: 10s
      interval: 30s
      retries: 3
      start_period: 40s
    networks:
      app-network: null
    restart: unless-stopped
networks:
  app-network:
    name: compose-application-stack_app-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
volumes:
  postgres-data:
    name: compose-application-stack_postgres-data
  redis-data:
    name: compose-application-stack_redis-data
